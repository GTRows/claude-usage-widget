name: Build Linux (AppImage + RPM + DEB + Pacman + tar.gz)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to attach artifacts to (e.g. v1.11.0-gtrows.1). Leave blank to skip release upload.'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        node-version: [18]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"

      - name: Override version for manual release upload
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        run: |
          VERSION="${{ inputs.release_tag }}"
          VERSION="${VERSION#v}"
          npm pkg set version="$VERSION"

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools rpm

      - name: Build Electron app (AppImage + RPM + DEB + Pacman + tar.gz)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built artifacts
        run: ls -lh dist/

      - name: Upload x64 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-x64
          path: dist/*x86_64*.AppImage
          if-no-files-found: error

      - name: Upload arm64 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-arm64
          path: dist/*arm64*.AppImage
          if-no-files-found: error

      - name: Upload RPMs
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-rpm
          path: dist/*.rpm
          if-no-files-found: error

      - name: Upload DEBs
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Upload Pacman packages
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-pacman
          path: dist/*.pacman
          if-no-files-found: error

      - name: Upload tarballs
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-tar
          path: dist/*.tar.gz
          if-no-files-found: error

      - name: Upload to Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: true
          files: |
            dist/*x86_64*.AppImage
            dist/*arm64*.AppImage
            dist/*.rpm
            dist/*.deb
            dist/*.pacman
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to existing release (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/*.AppImage \
            dist/*.rpm \
            dist/*.deb \
            dist/*.pacman \
            dist/*.tar.gz \
            --clobber --repo "$GITHUB_REPOSITORY"
